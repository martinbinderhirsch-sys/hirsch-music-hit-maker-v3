name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # nötig für Release-Erstellung

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Renderer + Main bauen
        run: npm run build

      - name: Windows-Installer (NSIS) erzeugen
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version aus package.json lesen
        id: pkg
        shell: pwsh
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup.exe + Update-Feed als GitHub Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: "Hirsch Music Hit Maker v${{ steps.pkg.outputs.version }}"
          body: |
            **Automatischer Build #${{ github.run_number }}**

            - Doppelklick auf den Installer zum Installieren
            - Auto-Updater zieht ab dieser Version künftige Updates automatisch
            - Falls Windows SmartScreen warnt: "Weitere Informationen" → "Trotzdem ausführen"
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
