name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # nötig für Release-Erstellung

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Renderer + Main bauen
        run: npm run build

      - name: Windows-Installer (NSIS) erzeugen
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup.exe als GitHub Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-build-${{ github.run_number }}
          name: "Hirsch Music Hit Maker v0.1.0 (Build ${{ github.run_number }})"
          body: |
            **Automatisch erzeugter Windows-Installer**

            - Doppelklick auf `Hirsch Music Hit Maker-Setup-0.1.0.exe` zum Installieren
            - Installer-Wizard erlaubt freie Verzeichniswahl
            - Erstellt Desktop- und Startmenü-Verknüpfung
            - Falls Windows SmartScreen warnt: "Weitere Informationen" → "Trotzdem ausführen"
              (Code-Signing-Zertifikat folgt vor Public Release)
          files: |
            release/*.exe
            release/*.exe.blockmap
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
