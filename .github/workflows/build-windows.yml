name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:   # erlaubt manuellen Start über GitHub-UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Renderer + Main bauen
        run: npm run build

      - name: Windows-Installer (NSIS) erzeugen
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Hirsch-Music-Hit-Maker-Setup
          path: release/*.exe
          retention-days: 30
          if-no-files-found: error
